<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Edit Config</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
body {
    font-family: 'Inter', sans-serif;
    background: #f0f2f5;
    margin: 0;
    padding: 2rem;
    color: #333;
}
h1 {
    text-align: center;
    margin-bottom: 2rem;
    color: #222;
}
.form-wrap {
    max-width: 1000px;
    margin: auto;
}
.section {
    background: white;
    padding: 1rem 1.5rem;
    margin-bottom: 1rem;
    border-radius: 10px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.08);
}
.section h2 {
    margin: 0;
    font-size: 1.2rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
}
.section-content {
    margin-top: 0.8rem;
}
label {
    display: block;
    margin-top: 0.6rem;
    font-weight: 600;
    font-size: 0.95rem;
}
input, select, textarea {
    width: 100%;
    padding: 0.5rem;
    margin-bottom: 0.7rem;
    border: 1px solid #ccc;
    border-radius: 5px;
    font-size: 0.95rem;
    transition: all 0.2s;
    box-sizing: border-box;
}
input[type="checkbox"] {
    width: auto;
    margin-right: 0.5rem;
}
input.changed, select.changed, textarea.changed {
    border-color: #4CAF50;
    background-color: #e6ffe6;
}
.button-row {
    display: flex;
    gap: 0.6rem;
    justify-content: center;
    flex-wrap: wrap;
}
button {
    padding: 0.6rem 1.2rem;
    cursor: pointer;
    border: none;
    border-radius: 6px;
    background: #4CAF50;
    color: white;
    font-weight: 600;
    font-size: 1rem;
    transition: background 0.2s;
}
button:hover {
    background: #45a049;
}
.secondary {
    background: #666;
}
.secondary:hover {
    background: #555;
}
.toggle-btn {
    font-size: 0.85rem;
    color: #555;
    background: #eee;
    border: none;
    border-radius: 4px;
    padding: 0.2rem 0.5rem;
    cursor: pointer;
}
.toggle-btn:hover {
    background: #ddd;
}
.checkbox-row {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    margin-bottom: 0.7rem;
}
.checkbox-row label {
    margin: 0;
}
.status {
    margin: 1rem auto 0;
    padding: 0.8rem;
    border-radius: 6px;
    font-weight: 600;
    max-width: 1000px;
}
.status.success { background: #e6ffe6; }
.status.error { background: #ffe6e6; }

@media (max-width: 600px) {
    body { padding: 0.8rem; }
    .section { padding: 0.8rem; }
}
</style>
</head>
<body>
<div id="app" class="form-wrap">
    <h1>Edit Config</h1>

    <div v-for="(keys, sectionName) in sections" :key="sectionName" class="section">
        <h2>
            <span>[[ sectionName ]]</span>
            <button type="button" class="toggle-btn" @click="toggleSection(sectionName)">
                [[ isOpen(sectionName) ? 'Hide' : 'Show' ]]
            </button>
        </h2>

        <div class="section-content" v-if="isOpen(sectionName)">
            <template v-for="key in keys" :key="key">
                <template v-if="hasKey(key)">
                    <div v-if="fieldType(key) === 'boolean'" class="checkbox-row">
                        <input
                            type="checkbox"
                            :id="key"
                            v-model="formValues[key]"
                            :class="{ changed: isChanged(key) }"
                        >
                        <label :for="key">[[ key ]]</label>
                    </div>

                    <template v-else>
                        <label :for="key">[[ key ]]</label>

                        <select
                            v-if="fieldType(key) === 'enum'"
                            :id="key"
                            v-model="formValues[key]"
                            :class="{ changed: isChanged(key) }"
                        >
                            <option v-for="ev in enumValues" :key="ev" :value="ev">[[ enumLabel(ev) ]]</option>
                        </select>

                        <textarea
                            v-else-if="fieldType(key) === 'array'"
                            :id="key"
                            v-model="formValues[key]"
                            :class="{ changed: isChanged(key) }"
                        ></textarea>

                        <input
                            v-else
                            type="text"
                            :id="key"
                            v-model="formValues[key]"
                            :class="{ changed: isChanged(key) }"
                        >
                    </template>
                </template>
            </template>
        </div>
    </div>

    <div class="button-row">
        <button type="button" class="secondary" @click="goBack">Back</button>
        <button type="button" @click="saveConfig">Save Config</button>
    </div>

    <div v-if="status.visible" class="status" :class="status.success ? 'success' : 'error'">
        [[ status.message ]]
    </div>
</div>

<script type="module" src="{{ url_for('static', filename='js/config-app.js') }}"></script>
</body>
</html>
